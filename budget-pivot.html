          </div>

          {/* Table */}
          <div className="bg-white shadow-xl rounded-xl overflow-hidden border border-purple-100">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 text-white">
                    <th className="p-2 text-left font-bold sticky left-0 bg-pink-500 z-20 min-w-[250px]">Projekt / Ucet</th>
                    {visibleMonths.map(monthNum => (
                      <th key={monthNum} colSpan={3} className="p-2 text-center font-bold border-l border-purple-400">
                        {months[monthNum - 1]}
                      </th>
                    ))}
                    <th colSpan={3} className="p-2 text-center font-bold border-l-2 border-yellow-400 bg-gradient-to-r from-yellow-500 to-orange-500">
                      CELKEM
                    </th>
                  </tr>
                  <tr className="bg-purple-100 text-purple-900 text-xs">
                    <th className="p-2 text-left font-semibold sticky left-0 bg-purple-100 z-20">Kod / Popis</th>
                    {visibleMonths.map(monthNum => (
                      <React.Fragment key={monthNum}>
                        <th className="p-1 text-right font-medium border-l border-purple-200 w-24 bg-blue-50">YOY</th>
                        <th className="p-1 text-right font-medium w-24 bg-green-50">PLAN</th>
                        <th className="p-1 text-right font-medium w-24 bg-orange-50">REAL</th>
                      </React.Fragment>
                    ))}
                    <th className="p-1 text-right font-medium border-l-2 border-yellow-400 w-24 bg-blue-100">YOY</th>
                    <th className="p-1 text-right font-medium w-24 bg-green-100">PLAN</th>
                    <th className="p-1 text-right font-medium w-24 bg-orange-100">REAL</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredData.map((category, catIndex) => {
                    const isExpanded = expandedCategories.has(category.name);
                    return (
                      <React.Fragment key={category.name}>
                        <tr
                          className="bg-gradient-to-r from-purple-50 to-pink-50 hover:from-purple-100 hover:to-pink-100 cursor-pointer font-semibold border-t border-purple-200"
                          onClick={() => toggleCategory(category.name)}
                        >
                          <td className="p-2 sticky left-0 bg-purple-50 z-10">
                            <div className="flex items-center gap-2">
                              {isExpanded ? <ChevronDown className="w-4 h-4 text-purple-600" /> : <ChevronRight className="w-4 h-4 text-purple-600" />}
                              <span className="text-purple-800">{category.name}</span>
                              <span className="text-xs text-purple-500">({category.items.length})</span>
                            </div>
                          </td>
                          {visibleMonths.map(monthNum => {
                            const monthKey = `${selectedYear}-${String(monthNum).padStart(2, '0')}`;
                            const totals = getCategoryTotals(category, monthKey);
                            return (
                              <React.Fragment key={monthNum}>
                                <td className="p-1 text-right border-l border-purple-100 bg-blue-50/50 text-xs">{formatCurrency(totals.yoy)}</td>
                                <td className="p-1 text-right bg-green-50/50 text-xs">{formatCurrency(totals.plan)}</td>
                                <td className="p-1 text-right bg-orange-50/50 text-xs">{formatCurrency(totals.real)}{getVarianceIndicator(totals.plan, totals.real)}</td>
                              </React.Fragment>
                            );
                          })}
                          <td className="p-1 text-right border-l-2 border-yellow-400 bg-blue-100/50 font-bold text-xs">{formatCurrency(getCategoryYearTotal(category, 'yoy'))}</td>
                          <td className="p-1 text-right bg-green-100/50 font-bold text-xs">{formatCurrency(getCategoryYearTotal(category, 'plan'))}</td>
                          <td className="p-1 text-right bg-orange-100/50 font-bold text-xs">{formatCurrency(getCategoryYearTotal(category, 'real'))}</td>
                        </tr>

                        {isExpanded && category.items.map((item, itemIndex) => (
                          <tr key={item.id} className={`hover:bg-gray-50 ${itemIndex % 2 === 0 ? 'bg-white' : 'bg-gray-25'}`}>
                            <td className="p-1 pl-8 sticky left-0 bg-white z-10 border-l-4 border-purple-200">
                              <div className="flex items-center gap-1 text-xs">
                                <span className="font-mono bg-gray-100 px-1 rounded">{item.code}</span>
                                <span className="font-mono bg-blue-100 text-blue-700 px-1 rounded">{item.country}</span>
                                <span className="text-gray-700">{item.description}</span>
                              </div>
                            </td>
                            {visibleMonths.map(monthNum => {
                              const monthKey = `${selectedYear}-${String(monthNum).padStart(2, '0')}`;
                              const data = item.monthlyData[monthKey] || { yoy: 0, plan: 0, real: 0 };
                              return (
                                <React.Fragment key={monthNum}>
                                  <td className="p-1 text-right border-l border-gray-100 text-gray-600 text-xs">{formatCurrency(data.yoy)}</td>
                                  <td className="p-1 text-right text-gray-600 text-xs">{formatCurrency(data.plan)}</td>
                                  <td className="p-1 text-right text-xs">{formatCurrency(data.real)}{getVarianceIndicator(data.plan, data.real)}</td>
                                </React.Fragment>
                              );
                            })}
                            <td className="p-1 text-right border-l-2 border-yellow-300 text-gray-700 font-medium text-xs">{formatCurrency(getItemYearTotal(item, 'yoy'))}</td>
                            <td className="p-1 text-right text-gray-700 font-medium text-xs">{formatCurrency(getItemYearTotal(item, 'plan'))}</td>
                            <td className="p-1 text-right text-gray-700 font-medium text-xs">{formatCurrency(getItemYearTotal(item, 'real'))}</td>
                          </tr>
                        ))}
                      </React.Fragment>
                    );
                  })}

                  {/* Grand Total */}
                  <tr className="bg-gradient-to-r from-gray-800 to-gray-900 text-white font-bold border-t-4 border-purple-500">
                    <td className="p-3 sticky left-0 bg-gray-800 z-10">CELKEM</td>
                    {visibleMonths.map(monthNum => {
                      const monthKey = `${selectedYear}-${String(monthNum).padStart(2, '0')}`;
                      const totals = getGrandTotals(monthKey);
                      return (
                        <React.Fragment key={monthNum}>
                          <td className="p-2 text-right border-l border-gray-600 text-xs">{formatCurrency(totals.yoy)}</td>
                          <td className="p-2 text-right text-xs">{formatCurrency(totals.plan)}</td>
                          <td className="p-2 text-right text-xs">{formatCurrency(totals.real)}{getVarianceIndicator(totals.plan, totals.real)}</td>
                        </React.Fragment>
                      );
                    })}
                    <td className="p-2 text-right border-l-2 border-yellow-400 bg-yellow-600 text-sm">{formatCurrency(getGrandYearTotal('yoy'))}</td>
                    <td className="p-2 text-right bg-green-600 text-sm">{formatCurrency(getGrandYearTotal('plan'))}</td>
                    <td className="p-2 text-right bg-orange-600 text-sm">{formatCurrency(getGrandYearTotal('real'))}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          {/* Legend */}
          <div className="mt-4 bg-white shadow-lg rounded-xl p-4 border border-purple-100">
            <h3 className="text-sm font-bold text-purple-600 mb-2">Legenda</h3>
            <div className="flex flex-wrap gap-4 text-xs">
              <div className="flex items-center gap-1"><div className="w-3 h-3 bg-blue-100 rounded"></div><span><strong>YOY</strong> - Minuly rok</span></div>
              <div className="flex items-center gap-1"><div className="w-3 h-3 bg-green-100 rounded"></div><span><strong>PLAN</strong> - Plan</span></div>
              <div className="flex items-center gap-1"><div className="w-3 h-3 bg-orange-100 rounded"></div><span><strong>REAL</strong> - Realita</span></div>
              <div className="flex items-center gap-1"><TrendingUp className="w-3 h-3 text-red-500" /><span>Prekroceni planu +5%</span></div>
              <div className="flex items-center gap-1"><TrendingDown className="w-3 h-3 text-green-500" /><span>Uspora -5%</span></div>
            </div>
          </div>

          {/* Summary */}
          <div className="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
            <div className="bg-white rounded-xl shadow p-4 border border-purple-100">
              <div className="text-xs text-gray-500">Celkem YOY</div>
              <div className="text-lg font-bold text-blue-600">{formatCurrency(getGrandYearTotal('yoy'))}</div>
            </div>
            <div className="bg-white rounded-xl shadow p-4 border border-purple-100">
              <div className="text-xs text-gray-500">Celkem PLAN</div>
              <div className="text-lg font-bold text-green-600">{formatCurrency(getGrandYearTotal('plan'))}</div>
            </div>
            <div className="bg-white rounded-xl shadow p-4 border border-purple-100">
              <div className="text-xs text-gray-500">Celkem REAL</div>
              <div className="text-lg font-bold text-orange-600">{formatCurrency(getGrandYearTotal('real'))}</div>
            </div>
            <div className="bg-white rounded-xl shadow p-4 border border-purple-100">
              <div className="text-xs text-gray-500">Pocet kategorii</div>
              <div className="text-lg font-bold text-purple-600">{filteredData.length}</div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<BudgetPivotTable />);
  </script>
</body>
</html>
