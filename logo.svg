<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pozadí -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#FFD700" stroke-width="5"/>

  <!-- Postava v pohybu -->
  <g transform="translate(100, 100)">
    <!-- Hlava -->
    <circle cx="0" cy="-40" r="20" fill="#FFD700"/>

    <!-- Tělo -->
    <line x1="0" y1="-20" x2="0" y2="30" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>

    <!-- Levá ruka - v pohybu nahoru -->
    <line x1="0" y1="-10" x2="-25" y2="-30" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>

    <!-- Pravá ruka - v pohybu dolů -->
    <line x1="0" y1="-10" x2="25" y2="10" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>

    <!-- Levá noha - krok vpřed -->
    <line x1="0" y1="30" x2="-20" y2="60" stroke="#FFD700" stroke-width="7" stroke-linecap="round"/>

    <!-- Pravá noha - zadní pozice -->
    <line x1="0" y1="30" x2="15" y2="55" stroke="#FFD700" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Text "MoveIn" -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">
    MoveIn
  </text>
</svg>
